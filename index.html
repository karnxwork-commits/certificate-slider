<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Certificate Slider</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #fff5f0, #ffe6d5);
    text-align: center;
}

h1 {
    padding: 20px;
    color: #d35400;
}

.slider {
    position: relative;
    max-width: 800px;
    margin: auto;
}

.slide {
    display: none;
}

.slide img {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.active {
    display: block;
}

/* ปุ่ม */
.prev, .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    padding: 10px;
    color: white;
    font-size: 20px;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    transform: translateY(-50%);
}

.prev { left: 10px; }
.next { right: 10px; }
</style>

</head>
<body>

<h1>🏆 ประกาศนียบัตรหน่วยงาน</h1>

<div class="slider">

    <div class="slide active">
        <img src="cert1.jpg">
    </div>

    <div class="slide">
        <img src="cert2.jpg">
    </div>

    <div class="slide">
        <img src="cert3.jpg">
    </div>

    <div class="slide">
        <img src="cert4.jpg">
    </div>

    <div class="prev" onclick="changeSlide(-1)">❮</div>
    <div class="next" onclick="changeSlide(1)">❯</div>

</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i) {
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
}

function changeSlide(step) {
    index += step;
    if (index >= slides.length) index = 0;
    if (index < 0) index = slides.length - 1;
    showSlide(index);
}

// auto slide
setInterval(() => {
    changeSlide(1);
}, 3000);
</script>

</body>
</html>
