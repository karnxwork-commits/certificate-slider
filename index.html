<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>GHB Certificates</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Kanit', sans-serif;
    background: linear-gradient(135deg, #fff6f0, #ffe3d0);
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 20px 10px;
}

.logo {
    width: 120px;
    margin-bottom: 10px;
}

h1 {
    color: #d35400;
    margin: 0;
}

/* GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    padding: 30px;
    max-width: 1000px;
    margin: auto;
}

.gallery img {
    width: 100%;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
    animation: zoomIn 0.3s ease;
}

/* CLOSE */
.close {
    position: absolute;
    top: 25px;
    right: 40px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}

/* ANIMATION */
@keyframes zoomIn {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* MOBILE */
@media (max-width: 768px) {
    .gallery {
        grid-template-columns: 1fr;
    }
}
</style>

</head>
<body>

<div class="header">
    <!-- เปลี่ยนโลโก้ตรงนี้ -->
    <img src="ghb-logo.png" class="logo">
    <h1>🏆 ประกาศนียบัตรหน่วยงาน</h1>
</div>

<div class="gallery">
    <img src="cert1.jpg" onclick="openLightbox(this.src)">
    <img src="cert2.jpg" onclick="openLightbox(this.src)">
    <img src="cert3.jpg" onclick="openLightbox(this.src)">
    <img src="cert4.jpg" onclick="openLightbox(this.src)">
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close">&times;</span>
    <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
    const lightbox = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");
    img.src = src;
    lightbox.style.display = "flex";
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
