<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Certificates</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #fff5f0, #ffe6d5);
    text-align: center;
}

h1 {
    padding: 20px;
    color: #d35400;
}

/* Grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

.gallery img {
    width: 100%;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Lightbox */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

.lightbox img {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 90%;
}

.close {
    position: absolute;
    top: 20px;
    right: 40px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}
</style>

</head>
<body>

<h1>🏆 ประกาศนียบัตรหน่วยงาน</h1>

<div class="gallery">
    <img src="cert1.jpg" onclick="openLightbox(this.src)">
    <img src="cert2.jpg" onclick="openLightbox(this.src)">
    <img src="cert3.jpg" onclick="openLightbox(this.src)">
    <img src="cert4.jpg" onclick="openLightbox(this.src)">
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close">&times;</span>
    <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
    document.getElementById("lightbox").style.display = "block";
    document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
