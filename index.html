<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>GHB Certificates</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Kanit', sans-serif;
    background: linear-gradient(135deg, #fff6f0, #ffe3d0);
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 20px 10px;
}

.logo {
    width: 120px;
    margin-bottom: 10px;
}

h1 {
    font-family: 'Kanit', sans-serif;
    font-weight: 600;
    font-size: 32px;
    color: #D71920;
    margin-top: 10px;

    /* ทำให้ดูแพง */
    letter-spacing: 0.5px;
    text-shadow: 0 2px 10px rgba(215, 25, 32, 0.15);
}

/* GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    padding: 30px;
    max-width: 1000px;
    margin: auto;
}

.gallery img {
    width: 100%;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
    animation: zoomIn 0.3s ease;
}

/* CLOSE */
.close {
    position: absolute;
    top: 25px;
    right: 40px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}

/* HEADER ANIMATION */
.header {
    text-align: center;
    padding: 40px 20px 20px;
    background: linear-gradient(180deg, #fff, #fdebe3);
    border-bottom: 1px solid #f1d2c4;

    /* animation */
    opacity: 0;
    transform: translateY(-30px);
    animation: fadeSlideDown 1s ease forwards;
}

/* LOGO */
.logo {
    width: 120px;
    margin-bottom: 15px;

    opacity: 0;
    transform: translateY(-20px);
    animation: fadeSlideDown 1s ease forwards;
    animation-delay: 0.2s;
}

/* TITLE */
h1 {
    font-family: 'Kanit', sans-serif;
    font-weight: 600;
    font-size: 32px;
    background: linear-gradient(90deg, #D71920, #F26A21);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    opacity: 0;
    transform: translateY(-20px);
    animation: fadeSlideDown 1s ease forwards;
    animation-delay: 0.4s;
}

/* KEYFRAME */
@keyframes fadeSlideDown {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
/* MOBILE */
@media (max-width: 768px) {
    .gallery {
        grid-template-columns: 1fr;
    }
}

    /* APPLE STYLE CARD */
.card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

/* รูป */
.card img {
    width: 100%;
    display: block;
    border-radius: 18px;
}

/* ลอยขึ้น */
.card:hover {
    transform: translateY(-12px) scale(1.03);
}

/* เงานุ่ม */
.card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    opacity: 0;
    transition: 0.5s;
}

.card:hover::before {
    opacity: 1;
}

/* ✨ แสงสะท้อนแบบ Apple */
.card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(
        120deg,
        rgba(255,255,255,0.5),
        rgba(255,255,255,0.1) 40%,
        transparent 60%
    );
    opacity: 0;
    transition: 0.5s;
}

.card:hover::after {
    opacity: 1;
}

/* 🎬 Animation ตอนโหลด (เด้งทีละใบ) */
.card {
    opacity: 0;
    transform: translateY(40px);
    animation: fadeUp 0.8s ease forwards;
}

.card:nth-child(1) { animation-delay: 0.2s; }
.card:nth-child(2) { animation-delay: 0.4s; }
.card:nth-child(3) { animation-delay: 0.6s; }
.card:nth-child(4) { animation-delay: 0.8s; }

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>
<body>

<div class="header">
    <!-- เปลี่ยนโลโก้ตรงนี้ -->
    <img src="ghb-logo.png" class="logo">
    <h1>🏆 ประกาศนียบัตรหน่วยงาน</h1>
</div>

<div class="gallery">
    <img src="cert1.jpg" onclick="openLightbox(this.src)">
    <img src="cert2.jpg" onclick="openLightbox(this.src)">
    <img src="cert3.jpg" onclick="openLightbox(this.src)">
    <img src="cert4.jpg" onclick="openLightbox(this.src)">
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close">&times;</span>
    <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
    const lightbox = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");
    img.src = src;
    lightbox.style.display = "flex";
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
